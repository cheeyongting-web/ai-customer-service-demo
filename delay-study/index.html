<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 客服体验研究 · AI Customer Service Study</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3D5AFE',
            'primary-dark': '#2A3EB1',
            'primary-light': '#EEF1FF',
            accent: '#00C2A8',
            ink: '#1F2430',
            'ink-soft': '#5B6172',
            'bg-soft': '#F4F6FB',
          },
          fontFamily: {
            sans: ['Inter', 'Noto Sans SC', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            card: '0 18px 50px -12px rgba(38, 51, 110, 0.18)',
            soft: '0 8px 24px -10px rgba(38, 51, 110, 0.22)',
          },
        },
      },
    };
  </script>
  <style>
    html, body { -webkit-font-smoothing: antialiased; }
    body {
      background:
        radial-gradient(1100px 520px at 12% -8%, #E5EBFF 0%, rgba(229,235,255,0) 60%),
        radial-gradient(900px 480px at 100% 0%, #E2FBF5 0%, rgba(226,251,245,0) 55%),
        #F4F6FB;
    }
    .material-symbols-rounded { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    @keyframes stageIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .stage-in { animation: stageIn .45s cubic-bezier(.22,.61,.36,1) forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .msg-in { animation: fadeInUp .3s ease-out forwards; }
    @keyframes progressFill { from { width: 0%; } to { width: 100%; } }
    .progress-bar { animation: progressFill var(--delay-time, 3s) linear forwards; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .shimmer-bg { background: linear-gradient(90deg, transparent, rgba(255,255,255,.55), transparent); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes pulseDot { 0%,100% { opacity:.35; transform: scale(1);} 50% { opacity:1; transform: scale(1.25);} }
    .pulse-dot { animation: pulseDot 1.2s ease-in-out infinite; }
    .pulse-dot:nth-child(2){ animation-delay:.2s; } .pulse-dot:nth-child(3){ animation-delay:.4s; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #CBD3E8; border-radius: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    /* Likert radio buttons */
    .likert-opt input { position: absolute; opacity: 0; pointer-events: none; }
    .likert-dot {
      width: 30px; height: 30px; border-radius: 9999px; border: 2px solid #C7CEE6;
      display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600;
      color: #8A92AD; transition: all .18s ease; background: #fff;
    }
    .likert-opt:hover .likert-dot { border-color: #3D5AFE; color: #3D5AFE; transform: translateY(-1px); }
    .likert-opt input:checked + .likert-dot {
      background: #3D5AFE; border-color: #3D5AFE; color: #fff; box-shadow: 0 6px 16px -6px rgba(61,90,254,.7);
      transform: translateY(-1px) scale(1.06);
    }
    .demo-opt input { position: absolute; opacity: 0; pointer-events: none; }
    .demo-opt .demo-box { transition: all .16s ease; }
    .demo-opt:hover .demo-box { border-color: #3D5AFE; background: #F7F9FF; }
    .demo-opt input:checked + .demo-box { border-color: #3D5AFE; background: #EEF1FF; color: #2A3EB1; font-weight: 600; box-shadow: 0 6px 16px -10px rgba(61,90,254,.8); }
    .hidden-stage { display: none; }
  </style>
</head>
<body class="font-sans text-ink min-h-screen">

  <!-- Language toggle (fixed) -->
  <button id="lang-toggle"
    class="fixed top-4 right-4 z-50 flex items-center gap-1.5 bg-white/90 backdrop-blur border border-slate-200 text-ink-soft hover:text-primary hover:border-primary/40 text-sm font-medium px-3.5 py-2 rounded-full shadow-soft transition-all">
    <span class="material-symbols-rounded text-[18px]">language</span>
    <span id="lang-toggle-label">English</span>
  </button>

  <!-- Top progress bar -->
  <div class="fixed top-0 left-0 w-full h-1 bg-transparent z-40">
    <div id="top-progress" class="h-full bg-gradient-to-r from-primary to-accent transition-all duration-500" style="width:0%"></div>
  </div>

  <main class="max-w-2xl mx-auto px-4 py-8 sm:py-12">
    <div id="app"><!-- stages injected here --></div>
    <footer class="mt-10 text-center text-xs text-ink-soft/70">
      <span id="footer-text">学术研究用途 · 匿名调查</span>
    </footer>
  </main>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
