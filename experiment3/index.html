<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 客服体验研究 · 实验三问卷</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
    rel="stylesheet"
  />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#3D5AFE",
            "primary-dark": "#2A3EB1",
            "primary-light": "#EEF1FF",
            accent: "#00C2A8",
            ink: "#1F2430",
            "ink-soft": "#5B6172",
            "bg-soft": "#F4F6FB"
          },
          fontFamily: {
            sans: ["Inter", "Noto Sans SC", "system-ui", "sans-serif"]
          },
          boxShadow: {
            card: "0 18px 50px -12px rgba(38, 51, 110, 0.18)",
            soft: "0 8px 24px -10px rgba(38, 51, 110, 0.22)"
          }
        }
      }
    };
  </script>
  <style>
    html,
    body {
      -webkit-font-smoothing: antialiased;
    }
    body {
      background: radial-gradient(
          1100px 520px at 12% -8%,
          #e5ebff 0%,
          rgba(229, 235, 255, 0) 60%
        ),
        radial-gradient(
          900px 480px at 100% 0%,
          #e2fbf5 0%,
          rgba(226, 251, 245, 0) 55%
        ),
        #f4f6fb;
    }
    .material-symbols-rounded {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }
    @keyframes stageIn {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .stage-in {
      animation: stageIn 0.45s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-in {
      animation: fadeInUp 0.3s ease-out forwards;
    }
    @keyframes pulseDot {
      0%, 100% { opacity: 0.35; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.25); }
    }
    .pulse-dot {
      animation: pulseDot 1.2s ease-in-out infinite;
    }
    .pulse-dot:nth-child(2) { animation-delay: 0.2s; }
    .pulse-dot:nth-child(3) { animation-delay: 0.4s; }

    /* Likert dots */
    .likert-opt input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .likert-dot {
      width: 30px;
      height: 30px;
      border-radius: 9999px;
      border: 2px solid #c7cee6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: #8a92ad;
      transition: all 0.18s ease;
      background: #fff;
    }
    .likert-opt:hover .likert-dot {
      border-color: #3d5afe;
      color: #3d5afe;
      transform: translateY(-1px);
    }
    .likert-opt input:checked + .likert-dot {
      background: #3d5afe;
      border-color: #3d5afe;
      color: #fff;
      box-shadow: 0 6px 16px -6px rgba(61, 90, 254, 0.7);
      transform: translateY(-1px) scale(1.06);
    }

    /* Choice boxes (single/multi) */
    .choice-opt input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .choice-box {
      transition: all 0.16s ease;
    }
    .choice-opt:hover .choice-box {
      border-color: #3d5afe;
      background: #f7f9ff;
    }
    .choice-opt input:checked + .choice-box {
      border-color: #3d5afe;
      background: #eef1ff;
      color: #2a3eb1;
      font-weight: 600;
      box-shadow: 0 6px 16px -10px rgba(61, 90, 254, 0.8);
    }
    .choice-opt.disabled .choice-box {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* Chat */
    .chat-bubble-user {
      background: #3d5afe;
      color: #fff;
      border-radius: 18px 18px 4px 18px;
    }
    .chat-bubble-ai {
      background: #fff;
      color: #1f2430;
      border-radius: 18px 18px 18px 4px;
      box-shadow: 0 8px 22px -14px rgba(38, 51, 110, 0.25);
      border: 1px solid #eef0f7;
    }

    /* Number input */
    .num-input {
      border: 2px solid #c7cee6;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 15px;
      width: 100px;
      text-align: center;
      transition: border-color 0.2s;
      outline: none;
    }
    .num-input:focus {
      border-color: #3d5afe;
      box-shadow: 0 0 0 3px rgba(61, 90, 254, 0.12);
    }
  </style>
</head>
<body class="font-sans text-ink min-h-screen">
  <!-- Top progress bar -->
  <div class="fixed top-0 left-0 w-full h-1 bg-transparent z-40">
    <div
      id="top-progress"
      class="h-full bg-gradient-to-r from-primary to-accent transition-all duration-500"
      style="width: 0%"
    ></div>
  </div>

  <main class="max-w-2xl mx-auto px-4 py-8 sm:py-12">
    <div id="app"><!-- stages injected here --></div>
    <footer class="mt-10 text-center text-xs text-ink-soft/70">
      学术研究用途 · 匿名调查 · 实验三
    </footer>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var airtableKey = params.get("airtable_key");
      var airtableBase = params.get("airtable_base");
      var airtableTable = params.get("airtable_table");

      try {
        if (airtableKey) localStorage.setItem("airtable_key", airtableKey);
        if (airtableBase) localStorage.setItem("exp3_airtable_base", airtableBase);
        if (airtableTable) localStorage.setItem("exp3_airtable_table", airtableTable);
      } catch (e) {}

      if (airtableKey || airtableBase || airtableTable) {
        params.delete("airtable_key");
        params.delete("airtable_base");
        params.delete("airtable_table");
        var cleanUrl =
          window.location.pathname +
          (params.toString() ? "?" + params.toString() : "") +
          window.location.hash;
        window.history.replaceState({}, document.title, cleanUrl);
      }
    })();
  </script>
  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
