<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极客智能硬件售后中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        'primary-dark': '#0E4AD6',
                        'primary-light': '#E8F0FF',
                        'bg-light': '#F5F7FA',
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes progress-fill {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        @keyframes pulse-dot {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        .message-fade-in {
            animation: fadeInUp 0.3s ease-out forwards;
        }
        
        .progress-bar {
            animation: progress-fill var(--delay-time, 3.5s) linear forwards;
        }
        
        .shimmer-bg {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        .pulse-dot {
            animation: pulse-dot 1.2s ease-in-out infinite;
        }
        
        .pulse-dot:nth-child(2) { animation-delay: 0.2s; }
        .pulse-dot:nth-child(3) { animation-delay: 0.4s; }
        
        .scrollbar-custom::-webkit-scrollbar {
            width: 4px;
        }
        
        .scrollbar-custom::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .scrollbar-custom::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 2px;
        }
        
        .scrollbar-custom::-webkit-scrollbar-thumb:hover {
            background: #94A3B8;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex items-center justify-center p-4">
    <!-- ==================== 变量配置区域（可手动修改） ==================== -->
    <script>
        // 响应速度条件：0为即时响应，5000为延迟 5 秒
        const DELAY_TIME_MS = 5000;
        // 诉求结果条件："AGREE" 为同意退款，"REJECT" 为拒绝退款，"RANDOM" 为随机匹配
        const SERVICE_OUTCOME = Math.random() < 0.5 ? "AGREE" : "REJECT";
        // AI 思考时的提示文案
        const LOADING_TEXT = "正在查阅设备日志与售后条款...";
    </script>
    
    <!-- 主聊天窗口 -->
    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col" style="height: 85vh; max-height: 700px;">
        <!-- 顶部标题栏 -->
        <header class="bg-primary px-4 py-3 flex items-center space-x-3 flex-shrink-0">
            <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
            </div>
            <div>
                <h1 class="text-white font-semibold text-base">极客智能硬件售后中心</h1>
                <p class="text-white/70 text-xs">在线客服 - 高价值订单处理</p>
            </div>
            <div class="ml-auto flex items-center space-x-1">
                <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                <span class="text-white/80 text-xs">在线</span>
            </div>
        </header>
        
        <!-- 聊天区域 -->
        <div class="flex-1 overflow-y-auto scrollbar-custom p-4 space-y-4" id="chat-container">
            <!-- 初始消息将由JS自动添加 -->
        </div>
        
        <!-- 快捷回复按钮区域 -->
        <div class="px-4 py-2 bg-gray-50 border-t border-gray-100" id="quick-reply-area">
            <button id="quick-reply-btn" class="w-full bg-white border border-primary/30 text-primary text-sm px-4 py-2.5 rounded-full hover:bg-primary-light transition-colors duration-200 flex items-center justify-center space-x-2 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
                <span>电脑黑屏无法重启，要求全额退款</span>
            </button>
        </div>
        
        <!-- 输入区域 -->
        <div class="p-3 bg-white border-t border-gray-200 flex-shrink-0" id="input-area">
            <div class="flex space-x-2">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="请输入您的问题..." 
                    class="flex-1 bg-gray-100 border-0 rounded-full px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 transition-all"
                >
                <button 
                    id="send-btn" 
                    class="bg-primary text-white px-5 py-2.5 rounded-full text-sm font-medium hover:bg-primary-dark transition-colors duration-200 flex items-center justify-center"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- 结束实验按钮（初始隐藏） -->
        <div class="p-4 bg-white border-t border-gray-200 hidden" id="end-area">
            <button id="end-btn" class="w-full bg-gradient-to-r from-primary to-primary-dark text-white py-3 rounded-xl font-medium text-sm hover:shadow-lg transition-all duration-300 flex items-center justify-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span>结束对话并填写问卷</span>
            </button>
        </div>
    </div>
    
    <script>
        // DOM 元素
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const quickReplyBtn = document.getElementById('quick-reply-btn');
        const quickReplyArea = document.getElementById('quick-reply-area');
        const inputArea = document.getElementById('input-area');
        const endArea = document.getElementById('end-area');
        const endBtn = document.getElementById('end-btn');
        
        // 状态变量
        let isProcessing = false;
        let hasReplied = false;
        
        // 初始消息
        const initialMessage = "您好，这里是极客智能硬件官方售后中心。系统检测到您的订单【SU-770笔记本电脑，实付￥8,999】已申请售后，请问您遇到了什么问题？";
        
        // 添加快捷回复文本
        const quickReplyText = "电脑黑屏无法重启，要求全额退款";
        
        // 最终结果消息
        const finalMessages = {
            AGREE: "经核实，您的设备符合退换货标准。我们同意为您办理全额退款及换新服务。",
            REJECT: "经核实，您的设备已激活并存在人为使用痕迹，不符合全额退款标准。"
        };
        
        // 添加AI消息
        function addAIMessage(text) {
            const messageHtml = `
                <div class="flex items-start space-x-2 message-fade-in">
                    <div class="w-8 h-8 bg-primary rounded-full flex items-center justify-center flex-shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <div class="flex-1">
                        <div class="bg-gray-100 rounded-2xl rounded-tl-md px-4 py-2.5 max-w-[90%]">
                            <p class="text-gray-800 text-sm leading-relaxed">${text}</p>
                        </div>
                        <span class="text-gray-400 text-xs mt-1 block">刚刚</span>
                    </div>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', messageHtml);
            scrollToBottom();
        }
        
        // 添加用户消息
        function addUserMessage(text) {
            const messageHtml = `
                <div class="flex items-start space-x-2 message-fade-in justify-end">
                    <div class="flex-1 flex flex-col items-end">
                        <div class="bg-primary text-white rounded-2xl rounded-tr-md px-4 py-2.5 max-w-[90%]">
                            <p class="text-sm leading-relaxed">${text}</p>
                        </div>
                        <span class="text-gray-400 text-xs mt-1 block">刚刚</span>
                    </div>
                    <div class="w-8 h-8 bg-gray-300 rounded-full flex items-center justify-center flex-shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', messageHtml);
            scrollToBottom();
        }
        
        // 添加Loading消息
        function addLoadingMessage() {
            const loadingHtml = `
                <div class="flex items-start space-x-2" id="loading-indicator">
                    <div class="w-8 h-8 bg-primary rounded-full flex items-center justify-center flex-shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <div class="flex-1">
                        <div class="bg-gray-100 rounded-2xl rounded-tl-md px-4 py-3 max-w-[90%]">
                            <!-- 进度条 -->
                            <div class="w-full bg-gray-300 rounded-full h-1.5 mb-3 overflow-hidden">
                                <div class="bg-primary h-1.5 rounded-full progress-bar relative" style="--delay-time: ${DELAY_TIME_MS}ms;">
                                    <div class="absolute inset-0 shimmer-bg"></div>
                                </div>
                            </div>
                            <!-- 文字和动画 -->
                            <div class="flex items-center space-x-2">
                                <div class="flex space-x-1">
                                    <span class="w-1.5 h-1.5 bg-primary rounded-full pulse-dot"></span>
                                    <span class="w-1.5 h-1.5 bg-primary rounded-full pulse-dot"></span>
                                    <span class="w-1.5 h-1.5 bg-primary rounded-full pulse-dot"></span>
                                </div>
                                <span class="text-gray-600 text-xs">${LOADING_TEXT}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', loadingHtml);
            scrollToBottom();
        }
        
        // 移除Loading消息
        function removeLoadingMessage() {
            const loadingIndicator = document.getElementById('loading-indicator');
            if (loadingIndicator) {
                loadingIndicator.remove();
            }
        }
        
        // 禁用输入
        function disableInput() {
            userInput.disabled = true;
            sendBtn.disabled = true;
            quickReplyBtn.disabled = true;
            userInput.classList.add('opacity-50', 'cursor-not-allowed');
            sendBtn.classList.add('opacity-50', 'cursor-not-allowed');
            quickReplyArea.classList.add('hidden');
        }
        
        // 显示结束按钮
        function showEndButton() {
            inputArea.classList.add('hidden');
            quickReplyArea.classList.add('hidden');
            endArea.classList.remove('hidden');
        }
        
        // 滚动到底部
        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // 处理用户消息
        function handleUserMessage(text) {
            if (isProcessing || hasReplied) return;
            
            isProcessing = true;
            hasReplied = true;
            
            // 添加用户消息
            addUserMessage(text);
            
            // 禁用输入
            disableInput();
            
            // 延迟后显示Loading
            setTimeout(() => {
                addLoadingMessage();
                
                // 根据DELAY_TIME_MS延迟后显示结果
                setTimeout(() => {
                    removeLoadingMessage();
                    
                    // 根据SERVICE_OUTCOME显示最终结果
                    const finalMessage = finalMessages[SERVICE_OUTCOME];
                    addAIMessage(finalMessage);
                    
                    // 显示结束按钮
                    showEndButton();
                }, DELAY_TIME_MS);
            }, 300);
        }
        
        // 快捷回复按钮点击
        quickReplyBtn.addEventListener('click', () => {
            handleUserMessage(quickReplyText);
        });
        
        // 发送按钮点击
        sendBtn.addEventListener('click', () => {
            const text = userInput.value.trim();
            if (text) {
                handleUserMessage(text);
                userInput.value = '';
            }
        });
        
        // 回车键发送
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const text = userInput.value.trim();
                if (text) {
                    handleUserMessage(text);
                    userInput.value = '';
                }
            }
        });
        
        // 结束按钮点击
        endBtn.addEventListener('click', () => {
            alert('感谢您的参与！即将跳转到问卷页面...');
            // 这里可以添加实际的问卷跳转逻辑
            // window.location.href = '问卷链接';
        });
        
        // 页面加载后显示初始消息
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                addAIMessage(initialMessage);
            }, 500);
        });
    </script>
</body>
</html>
